# ============================================
# 账单查询系统 - Docker Compose
# 本地部署（WSL2 Docker，PG 用同网络的 quant-postgres）
# ============================================
services:
  web:
    build: .
    container_name: bill-web
    restart: always
    ports:
      - "8765:8765"
    environment:
      # 连接 quant-network 中已有的 quant-postgres
      - DB_HOST=quant-postgres
      - DB_PORT=5432
      - DB_USER=infohub
      - DB_PASSWORD=infohub123
      - DB_NAME=infohub
      # 只读连接（AI 查询用，与读写一致即可）
      - READER_HOST=quant-postgres
      - READER_PORT=5432
      - READER_USER=infohub
      - READER_PASSWORD=infohub123
      - READER_NAME=infohub
      # DeepSeek AI API Key（通过 .env 覆盖）
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - quant-network

networks:
  quant-network:
    external: true
